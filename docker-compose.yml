# version: '3.8'  # Added this line (required for Docker Compose)

services:
    ####################################################################################################
    # PHP
    ####################################################################################################
    php:
        build: .docker/php
        ports:
            - 5173:5173
            - 8000:8000
        volumes:
            - .:/var/www:cached
        command: sh -c "composer install --no-interaction && php artisan serve --host=0.0.0.0 --port=8000"
        networks:  # Added this block
            - app-network

    ####################################################################################################
    # Nginx
    ####################################################################################################
    nginx:
        image: nginx
        ports:
            - 80:80
        volumes:
            - .:/var/www
            - .docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
            - .docker/nginx/nginx.conf:/etc/nginx/nginx.conf
        depends_on:
            - php
        networks:  # Added this block
            - app-network

    ####################################################################################################
    # DATABASE (MySQL)
    ####################################################################################################
    mysql:
        image: mysql:8.1
        ports:
            - 3306:3306
        volumes:
            - .docker/mysql/data:/var/lib/mysql
            - .docker/mysql/logs:/var/log/mysql
            - .docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
            - .docker/mysql/sql:/docker-entrypoint-initdb.d
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: kasl_mysql
            MYSQL_USER: kasl
            MYSQL_PASSWORD: kasl
        networks:  # Added this block
            - app-network

    ####################################################################################################
    # DATABASE (MariaDB)
    ####################################################################################################
    mariadb:
        image: mariadb:10.11
        ports:
            - 3307:3306
        volumes:
            - .docker/mariadb/data:/var/lib/mysql
            - .docker/mariadb/logs:/var/log/mysql
            - .docker/mariadb/my.cnf:/etc/mysql/conf.d/my.cnf
            - .docker/mariadb/sql:/docker-entrypoint-initdb.d
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: kasl_mariadb
            MYSQL_USER: kasl
            MYSQL_PASSWORD: kasl
        networks:  # Added this block
            - app-network

    ####################################################################################################
    # phpMyAdmin
    ####################################################################################################
    phpmyadmin:
        image: phpmyadmin/phpmyadmin
        ports:
            - 8080:80
        environment:
            PMA_HOSTS: mysql,mariadb
            PMA_PORTS: 3306,3306
            PMA_ARBITRARY: 1
        volumes:
            - .docker/phpmyadmin/sessions:/sessions
        depends_on:
            - mysql
            - mariadb
        networks:  # Added this block
            - app-network

    ####################################################################################################
    # Redis
    ####################################################################################################
    # redis:
    #     image: redis:latest
    #     command: redis-server --appendonly yes
    #     volumes:
    #         - .docker/redis/data:/data
    #     ports:
    #         - 6379:6379

    ####################################################################################################
    # Mailpit
    ####################################################################################################
    mail:
        image: axllent/mailpit:latest
        ports:
            - 8025:8025
            - 1025:1025
        networks:  # Added this block
            - app-network

    ####################################################################################################
    # PostgreSQL (commented out as not requested)
    ####################################################################################################
    # db:
    #     image: postgres:16
    #     ports:
    #         - 5432:5432
    #     volumes:
    #         - .docker/db/data:/var/lib/postgresql/data
    #         - .docker/db/sql:/docker-entrypoint-initdb.d
    #     environment:
    #         - POSTGRES_USER=kasl
    #         - POSTGRES_PASSWORD=kasl
    #         - POSTGRES_DB=kasl

    ####################################################################################################
    # pgAdmin (commented out as not requested)
    ####################################################################################################
    # pgadmin:
    #     image: dpage/pgadmin4
    #     ports:
    #         - 5050:80
    #     environment:
    #         - PGADMIN_DEFAULT_EMAIL=admin@admin.com
    #         - PGADMIN_DEFAULT_PASSWORD=password
    #     depends_on:
    #         - db

# Added this section (required for networking)
networks:
    app-network:
        driver: bridge
